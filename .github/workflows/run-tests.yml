name: Run All Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU torch
        run: pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt --ignore-requires-python

      - name: Run Task 1 tests
        run: python -m pytest test_task1.py -v

      - name: Run Task 2 tests
        run: python -m pytest test_task2.py -v

      - name: Run Task 3 tests
        run: python -m pytest test_task3.py -v